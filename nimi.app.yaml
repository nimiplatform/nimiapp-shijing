app_id: nimi.shijing
display_name: ShiJing
profile: workspace-app
manifest_role: submitted-input
permissions:
  declared_nimi_api_scopes:
    - scope: runtime.ai.text.generate
      qualifier: shijing-reading
      purpose: Generate ShiJing reading wording through Runtime AI using host-owned model configuration.
    - scope: app.local.drafts
      qualifier: app-local-drafts
      purpose: Store drafts owned by this app during author testing.
