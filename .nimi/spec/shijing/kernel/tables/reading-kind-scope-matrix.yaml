# SJG-ASTRO-03 — Reading kind / scope matrix.
# Machine source of truth. The human-readable copy lives in
# spec/kernel/astrology-contract.md (table under SJG-ASTRO-03).
#
# Each entry pairs (kind, scope) with one of:
#   allowed       — pairing is admitted with no extra constraint
#   forbidden     — pairing MUST fail-close
#   self_only     — pairing is admitted only when anchor_subject === "self"
#                   AND subjects === ["self"]
#
# Additional consultation-anchor and today-anchor rules live in
# spec/kernel/astrology-contract.md SJG-ASTRO-07.

contract: SJG-ASTRO-03
version: 1
kinds:
  - today
  - period_outlook
  - key_window
  - sign
  - consultation
scopes:
  - subject
  - view
  - ad_hoc
matrix:
  today:
    subject: allowed
    view: forbidden
    ad_hoc: forbidden
  period_outlook:
    subject: allowed
    view: allowed
    ad_hoc: allowed
  key_window:
    subject: forbidden
    view: allowed
    ad_hoc: allowed
  sign:
    subject: self_only
    view: forbidden
    ad_hoc: forbidden
  consultation:
    subject: allowed
    view: allowed
    ad_hoc: allowed
