profile_id: shijing

spec_governance:
  canonical_root: .nimi/spec

ai_governance:
  context_budget:
    version: 1
    default_profile: production
    profiles:
      production:
        warning_lines: 500
        warning_bytes: 61440
        warning_max_line_bytes: 2000
        warning_average_line_bytes: 350
        error_lines: 800
        error_bytes: 102400
        error_max_line_bytes: 12000
        error_average_line_bytes: 900
      tests:
        warning_lines: 900
        warning_max_line_bytes: 3000
        warning_average_line_bytes: 500
        error_lines: 1400
        error_max_line_bytes: 12000
        error_average_line_bytes: 1200
      scripts:
        warning_lines: 1000
        warning_max_line_bytes: 3000
        warning_average_line_bytes: 500
        error_lines: 1400
        error_max_line_bytes: 12000
        error_average_line_bytes: 1200
      spec_yaml:
        warning_lines: 800
        warning_max_line_bytes: 4000
        warning_average_line_bytes: 800
        error_lines: 1200
        error_max_line_bytes: 16000
        error_average_line_bytes: 1600
      generated:
        warning_lines: 2000
        warning_max_line_bytes: 16000
        warning_average_line_bytes: 1600
        error_lines: 4000
        error_max_line_bytes: 64000
        error_average_line_bytes: 6400
    classifiers:
      scripts:
        - scripts/**
      tests:
        - test/**
        - "**/*.test.js"
        - "**/*.test.ts"
        - "**/*.test.mjs"
        - "**/*.test.tsx"
        - "**/*.spec.js"
        - "**/*.spec.ts"
        - "**/*.spec.mjs"
        - "**/*.spec.tsx"
        - "**/*_tests.rs"
        - "**/*_test.go"
        - "**/*_test.py"
        - "**/test_*.py"
        - "**/__tests__/**"
      spec_yaml:
        - .nimi/spec/**/*.yaml
        - .nimi/spec/**/*.yml
      generated:
        - .nimi/spec/**/kernel/generated/**
        - "**/generated/**"
        - "**/gen/**"
        - "**/core_generated/**"
        - "**/core-generated/**"
        - "**/coregenerated/**"
    exclude:
      - .cache/**
      - .codex-logs/**
      - .local/**
      - .nimi/cache/**
      - .nimi/local/**
      - .nimi/topics/**
      - dist/**
      - docs/**
      - node_modules/**
      - src-tauri/gen/**
      - src-tauri/target/**
      - pnpm-lock.yaml
      - "**/Cargo.lock"
      - "**/*.ico"
      - "**/*.icns"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.webp"
      - "**/*.svg"
      - "**/*.frag"
      - "**/*.vert"
      - "**/*.min.js"
      - "**/*.wav"
      - "**/*.mp3"
      - "**/*.m4a"
      - "**/*.ogg"
      - "**/*.flac"
      - "**/*.aac"
      - "**/*.mp4"
      - "**/*.mov"
      - "**/*.webm"
      - "**/*.vrm"
      - "**/*.vrma"
      - src/product/natal/*.data.json
      - src/shell/locales/*.json
    waivers: []
  structure_budget:
    version: 1
    allowed_forwarding_shells:
      - index.ts
      - index.tsx
      - mod.rs
    rules:
      - id: shijing_src
        include:
          - src/**
        depth_base: src
        warning_depth: 5
        error_depth: 7
      - id: shijing_tests
        include:
          - test/**
        depth_base: test
        warning_depth: 3
        error_depth: 4
      - id: shijing_scripts
        include:
          - scripts/**
        depth_base: scripts
        warning_depth: 2
        error_depth: 3
      - id: shijing_tauri
        include:
          - src-tauri/src/**
        depth_base: src-tauri/src
        warning_depth: 4
        error_depth: 5
    exclude:
      - .cache/**
      - .codex-logs/**
      - .local/**
      - .nimi/cache/**
      - .nimi/local/**
      - .nimi/topics/**
      - dist/**
      - docs/**
      - node_modules/**
      - src-tauri/gen/**
      - src-tauri/target/**
      - pnpm-lock.yaml
      - "**/Cargo.lock"
      - "**/*.ico"
      - "**/*.icns"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.webp"
      - "**/*.svg"
      - "**/*.frag"
      - "**/*.vert"
      - "**/*.min.js"
      - "**/*.wav"
      - "**/*.mp3"
      - "**/*.m4a"
      - "**/*.ogg"
      - "**/*.flac"
      - "**/*.aac"
      - "**/*.mp4"
      - "**/*.mov"
      - "**/*.webm"
      - "**/*.vrm"
      - "**/*.vrma"
      - src/product/natal/*.data.json
      - src/shell/locales/*.json
    waivers: []
